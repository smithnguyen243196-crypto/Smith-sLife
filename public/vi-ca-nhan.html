<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ví Cá Nhân</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080b12; --surface:#0f1520; --surface2:#161e2e; --border:#1e2d45;
  --text:#e8f0fe; --muted:#4a6080;
  --green:#00e5a0; --green-dim:rgba(0,229,160,0.12);
  --red:#ff4d6d;   --red-dim:rgba(255,77,109,0.12);
  --blue:#4d9fff;  --gold:#fbbf24;
  --purple:#a78bfa; --purple-dim:rgba(167,139,250,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#app{max-width:430px;margin:0 auto;min-height:100vh;}

/* header */
.hdr{padding:48px 20px 12px;background:linear-gradient(180deg,#0a1628,transparent);position:sticky;top:0;z-index:10;backdrop-filter:blur(20px);}
.hdr-row{display:flex;justify-content:space-between;align-items:center;}
.hdr-name{font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--muted);}
.hdr-right{display:flex;gap:8px;align-items:center;}
.icon-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--muted);font-size:14px;cursor:pointer;font-family:'Sora',sans-serif;}

/* dot */
.dot{width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block;}
.dot.ok{background:var(--green);}.dot.loading{background:var(--gold);animation:blink 1s infinite;}.dot.err{background:var(--red);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* balance */
.bal-card{margin:0 16px 16px;background:linear-gradient(135deg,#0d1f35,#0a1628);border:1px solid var(--border);border-radius:20px;padding:20px;}
.bal-lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.bal-amt{font-size:32px;font-weight:800;letter-spacing:-1px;font-family:'JetBrains Mono',monospace;color:var(--text);}
.bal-amt.pos{color:var(--green);}.bal-amt.neg{color:var(--red);}
.bal-month{font-size:12px;color:var(--muted);margin-top:4px;}
.bal-row{display:flex;gap:10px;margin-top:14px;}
.mini{flex:1;background:var(--surface2);border-radius:12px;padding:10px;}
.mini-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.mini-val{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;}
.mini-val.inc{color:var(--green);}.mini-val.exp{color:var(--red);}

/* month picker */
.mpick{display:flex;align-items:center;gap:10px;padding:0 16px 12px;}
.mpick label{font-size:12px;color:var(--muted);flex-shrink:0;}
.mpick input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 10px;font-size:13px;font-family:'Sora',sans-serif;}

/* tabs */
.tabs{display:flex;margin:0 16px 14px;background:var(--surface);border-radius:12px;padding:4px;gap:4px;}
.tab{flex:1;padding:8px 2px;background:transparent;border:none;border-radius:8px;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;transition:all 0.2s;}
.tab.active{background:var(--surface2);color:var(--text);}

/* sections */
.sec{padding:0 16px 110px;display:none;}
.sec.show{display:block;}

/* txn list — scrollable fixed height */
.txn-scroll{max-height:520px;overflow-y:auto;padding-right:2px;}
.txn-scroll::-webkit-scrollbar{width:3px;}
.txn-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* skeleton */
.skel{background:var(--surface);border-radius:14px;margin-bottom:8px;padding:14px;}
.skel-line{height:11px;background:var(--border);border-radius:6px;margin-bottom:8px;animation:blink 1.5s infinite;}
.skel-line.s{width:40%;}

/* txn items */
.grp-lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:14px 0 8px;}
.txn{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px 12px;margin-bottom:8px;animation:up 0.25s ease;}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.txn-ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.txn-ico.inc{background:var(--green-dim);}.txn-ico.exp{background:var(--red-dim);}
.txn-body{flex:1;min-width:0;}

/* aligned layout for txn rows */
.txn-row1{display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px;margin-bottom:3px;}
.txn-cat{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.txn-amt{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;white-space:nowrap;}
.txn-amt.inc{color:var(--green);}.txn-amt.exp{color:var(--red);}
.txn-row2{display:grid;grid-template-columns:1fr auto;align-items:center;gap:8px;}
.txn-meta{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.del-btn{background:transparent;border:none;color:var(--border);font-size:18px;cursor:pointer;line-height:1;padding:0 2px;flex-shrink:0;}
.del-btn:hover{color:var(--red);}

/* badges */
.badge{border-radius:4px;padding:1px 5px;font-size:10px;font-weight:600;}
.badge-notion{background:rgba(77,159,255,0.15);color:var(--blue);}
.badge-sync{background:rgba(251,191,36,0.15);color:var(--gold);animation:blink 1s infinite;}
.badge-bank{background:var(--purple-dim);color:var(--purple);}
.badge-cash{background:rgba(251,191,36,0.12);color:var(--gold);}
.badge-person{background:rgba(0,229,160,0.1);color:var(--green);}

.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;line-height:2;}

/* export bar */
.export-bar{display:flex;gap:8px;margin-bottom:12px;}
.export-btn{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px;color:var(--text);font-size:12px;font-weight:600;font-family:'Sora',sans-serif;cursor:pointer;text-align:center;}
.export-btn:hover{border-color:var(--blue);color:var(--blue);}

/* stats */
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;}
.stat-title{font-size:13px;font-weight:700;margin-bottom:12px;}
.srow{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.srow-name{font-size:12px;width:120px;flex-shrink:0;}
.bar-bg{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.bar-fg{height:100%;border-radius:3px;}
.srow-val{font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;width:80px;text-align:right;flex-shrink:0;}
.wrow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.wrow:last-child{border-bottom:none;padding-bottom:0;}
.wrow-name{font-size:13px;font-weight:600;}.wrow-val{font-size:14px;font-weight:700;font-family:'JetBrains Mono',monospace;}

/* settings */
.set-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px;}
.set-title{font-size:13px;font-weight:700;margin-bottom:4px;}
.set-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:14px;}
.fld-lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.fld{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:11px 14px;font-size:13px;font-family:'Sora',sans-serif;margin-bottom:12px;}
.fld:focus{outline:none;border-color:var(--blue);}
.fld::placeholder{color:var(--muted);}
.blue-btn{width:100%;background:var(--blue);border:none;border-radius:10px;padding:12px;color:#fff;font-weight:700;font-size:14px;font-family:'Sora',sans-serif;cursor:pointer;}
.status{border-radius:10px;padding:10px 14px;margin-top:10px;font-size:13px;}
.status.ok{background:var(--green-dim);color:var(--green);}.status.warn{background:rgba(251,191,36,0.12);color:var(--gold);}
.steps{list-style:none;}
.steps li{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.6;color:var(--muted);}
.steps li:last-child{border-bottom:none;}
.step-n{width:22px;height:22px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--blue);flex-shrink:0;margin-top:1px;}
code{background:var(--surface2);border-radius:4px;padding:1px 6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--blue);word-break:break-all;}

/* bottom nav */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#080f1e;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:10px 16px 28px;z-index:20;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;background:transparent;border:none;color:var(--muted);font-size:10px;font-weight:600;font-family:'Sora',sans-serif;cursor:pointer;padding:6px 16px;border-radius:10px;}
.nav-item .ni{font-size:20px;}
.nav-item.active{color:var(--green);}
.nav-home{background:linear-gradient(135deg,var(--green),#00b87a);color:#000!important;border-radius:16px;padding:10px 22px;box-shadow:0 4px 20px rgba(0,229,160,0.3);}

/* overlay + sheet */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:30;backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity 0.25s;}
.overlay.on{opacity:1;pointer-events:all;}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:430px;background:var(--surface);border-radius:24px 24px 0 0;padding:0 20px 40px;z-index:31;transition:transform 0.35s cubic-bezier(0.34,1.2,0.64,1);max-height:94vh;overflow-y:auto;}
.sheet.on{transform:translateX(-50%) translateY(0);}
.sheet-pull{width:40px;height:4px;background:var(--border);border-radius:2px;margin:14px auto 0;}
.sheet-hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 0 16px;}
.sheet-title{font-size:18px;font-weight:800;}
.sheet-back{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:7px 14px;color:var(--muted);font-size:12px;font-weight:600;font-family:'Sora',sans-serif;cursor:pointer;}

/* form */
.type-row{display:flex;gap:8px;margin-bottom:12px;}
.type-btn{flex:1;padding:10px;border:1px solid var(--border);border-radius:12px;background:var(--surface2);color:var(--muted);font-weight:700;font-size:13px;font-family:'Sora',sans-serif;cursor:pointer;transition:all 0.2s;}
.type-btn.inc.on{background:var(--green-dim);border-color:var(--green);color:var(--green);}
.type-btn.exp.on{background:var(--red-dim);border-color:var(--red);color:var(--red);}
.amt-box{font-size:30px;font-weight:800;font-family:'JetBrains Mono',monospace;text-align:center;padding:14px;background:var(--surface2);border-radius:14px;margin-bottom:12px;min-height:64px;display:flex;align-items:center;justify-content:center;letter-spacing:-1px;color:var(--muted);}
.amt-box.has.inc{color:var(--green);}.amt-box.has.exp{color:var(--red);}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.num{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px;font-size:20px;font-weight:600;color:var(--text);cursor:pointer;font-family:'Sora',sans-serif;}
.num:active{background:var(--border);transform:scale(0.95);}
.num.del{font-size:15px;color:var(--muted);}
.wallet-row{display:flex;gap:8px;margin-bottom:12px;}
.wallet-btn{flex:1;padding:9px;border:1px solid var(--border);border-radius:12px;background:var(--surface2);color:var(--muted);font-weight:600;font-size:13px;font-family:'Sora',sans-serif;cursor:pointer;transition:all 0.2s;}
.wallet-btn.bank-on{background:var(--purple-dim);border-color:var(--purple);color:var(--purple);}
.wallet-btn.cash-on{background:rgba(251,191,36,0.12);border-color:var(--gold);color:var(--gold);}
.cat-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.cat-chip{padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:100px;font-size:12px;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.cat-chip.on{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600;}

/* person field */
.person-wrap{position:relative;margin-bottom:12px;}
.fld-in{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:11px 14px;font-size:14px;font-family:'Sora',sans-serif;}
.fld-in:focus{outline:none;border-color:var(--blue);}
.fld-in::placeholder{color:var(--muted);}
.person-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:12px;z-index:50;overflow:hidden;display:none;}
.person-list.show{display:block;}
.person-opt{padding:10px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border);}
.person-opt:last-child{border-bottom:none;}
.person-opt:hover{background:var(--surface2);}

.note-in{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:11px 14px;font-size:14px;font-family:'Sora',sans-serif;margin-bottom:12px;}
.note-in:focus{outline:none;border-color:var(--blue);}
.note-in::placeholder{color:var(--muted);}
.date-in{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:11px 14px;font-size:14px;font-family:'Sora',sans-serif;margin-bottom:16px;}
.save-btn{width:100%;background:linear-gradient(135deg,var(--green),#00b87a);border:none;border-radius:14px;padding:15px;color:#000;font-weight:800;font-size:16px;font-family:'Sora',sans-serif;cursor:pointer;}
.save-btn:disabled{opacity:0.5;}
.flbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
</style>
</head>

<style>
.qotd{background:#14241B;color:#DCE7DE;font-family:'Be Vietnam Pro',system-ui,sans-serif;padding:calc(10px + env(safe-area-inset-top)) 16px 10px;font-size:13px;line-height:1.5;text-align:center;}
.qotd em{font-style:italic;}
.qotd .qotd-ai{color:#E8913A;font-style:normal;font-weight:600;white-space:nowrap;}
.app-tabs{position:fixed;left:0;right:0;bottom:0;z-index:22;display:flex;background:#14241B;padding-bottom:env(safe-area-inset-bottom);font-family:'Be Vietnam Pro',system-ui,sans-serif;box-shadow:0 -4px 16px rgba(0,0,0,.22);}
.app-tabs .thome{flex:0 0 56px;display:flex;align-items:center;justify-content:center;color:#E8913A;padding:8px 0 7px;border-top:2.5px solid transparent;}
.app-tabs .thome:active{color:#FFFFFF;}
.app-tabs a{flex:1;text-align:center;padding:10px 4px 9px;font-size:12.5px;font-weight:600;color:#9DB5A6;text-decoration:none;border-top:2.5px solid transparent;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.app-tabs a.on{color:#FFFFFF;border-top-color:#E8913A;}
body{padding-bottom:64px;}
.bnav{bottom:42px !important;padding-bottom:12px !important;}
</style>
<div class="qotd" id="qotd" hidden></div>
<nav class="app-tabs"><a href="/" class="thome" title="Trang chủ" aria-label="Trang chủ"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg></a><a href="/kiem-ket.html">Kiểm Két</a><a href="/vi-ca-nhan.html" class="on">Ví</a><a href="/ngay.html">Ngày</a><a href="/tinh-lai.html">Tính Lãi</a></nav>
<script>
fetch('/api/quote').then(function(r){return r.json()}).then(function(d){
  if(!d||!d.text)return;
  var el=document.getElementById('qotd');
  var em=document.createElement('em');em.textContent='“'+d.text+'”';
  el.appendChild(em);
  if(d.author){var sp=document.createElement('span');sp.className='qotd-ai';sp.textContent=' — '+d.author;el.appendChild(sp);}
  el.hidden=false;
}).catch(function(){});
</script>

  <div class="hdr">
    <div class="hdr-row">
      <div class="hdr-name">Ví cá nhân · Smith</div>

        <span class="dot" id="syncDot"></span>
        <button class="icon-btn" onclick="loadData()">🔄</button>

      </div>
    </div>

  <div class="bal-card">
    <div class="bal-lbl">Số dư tháng này</div>
    <div class="bal-amt" id="balAmt">₫0</div>
    <div class="bal-month" id="balMonth"></div>
    <div class="bal-row">
      <div class="mini"><div class="mini-lbl">↑ Thu</div><div class="mini-val inc" id="totInc">₫0</div></div>

    <button class="tab" id="tab-settings" onclick="showTab('settings')">⚙️ Cài đặt</button>
  </div>

  <div class="sec show" id="sec-txns"></div>
  <div class="sec" id="sec-stats"></div>
  <div class="sec" id="sec-settings"></div>
</div>

<div class="bnav">
  <button class="nav-item" id="nav-txns" onclick="showTab('txns')"><span class="ni">📋</span>Giao dịch</button>
  <button class="nav-item nav-home" onclick="showTab('txns')"><span class="ni">🏠</span>Home</button>
  <button class="nav-item" onclick="openSheet()"><span class="ni">➕</span>Thêm</button>
</div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>

<div class="sheet" id="sheet">
  <div class="sheet-pull"></div>
  <div class="sheet-hdr">
    <div class="sheet-title">Giao dịch mới</div>
    <button class="sheet-back" onclick="closeSheet()">✕ Đóng</button>
  </div>

  <div class="type-row">
    <button class="type-btn exp on" id="btnExp" onclick="setType('expense')">↓ Chi tiêu</button>
    <button class="type-btn inc" id="btnInc" onclick="setType('income')">↑ Thu nhập</button>

    <button class="num" onclick="pad('3')">3</button>
    <button class="num" onclick="pad('4')">4</button>
    <button class="num" onclick="pad('5')">5</button>
    <button class="num" onclick="pad('6')">6</button>
    <button class="num" onclick="pad('7')">7</button>
    <button class="num" onclick="pad('8')">8</button>

  </div>

    <div class="person-list" id="personList"></div>

  <input class="note-in" id="noteIn" placeholder="Nhập lý do...">

  <div class="flbl" style="margin-top:12px">📅 Ngày</div>
  <input class="date-in" type="date" id="dateIn">

  <button class="save-btn" id="saveBtn" onclick="saveTxn()">💾 Lưu giao dịch</button>
</div>

<script>
var CATS = {
  income:  ['💼 Lương','💰 Kinh doanh','🎁 Thưởng','📈 Đầu tư','🌾 Nông nghiệp','🔄 Khác'],
  expense: ['🍜 Ăn uống','💑 Đưa vợ','🏠 Nhà ở','🚗 Di chuyển','🛍️ Mua sắm','💊 Y tế','📚 Học tập','🎮 Giải trí','⛽ Xăng xe','🔄 Khác']
};
var PERSONS = ['Anh Tài','Hải','Anh Thắng','Gin','Như Ý','Chị Hân','Tiên','Đô','Uyên'];

var txns = [];
var cfg = {};
var curType = 'expense';
var curWallet = 'bank';
var curCat = CATS.expense[0];
var amtStr = '';

// ── helpers ──
function getMonth() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function getToday() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmt(n) { return new Intl.NumberFormat('vi-VN',{style:'currency',currency:'VND'}).format(n); }
function fmtS(n) {
  if(n>=1e9) return (n/1e9).toFixed(1).replace('.0','')+'tỷ';
  if(n>=1e6) return (n/1e6).toFixed(1).replace('.0','')+'tr';
  if(n>=1e3) return (n/1e3).toFixed(0)+'k';
  return String(n);
}
function toast(msg) {
  var t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:85px;left:50%;transform:translateX(-50%);background:#1e2d45;border:1px solid #2a4060;color:#e8f0fe;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;font-family:Sora,sans-serif;z-index:99;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.4);';
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 2800);
}
function setDot(s) { var d=document.getElementById('syncDot'); if(d) d.className='dot '+s; }
function saveCfg() { localStorage.setItem('vcn_cfg', JSON.stringify(cfg)); }
function loadCfg() { try{ cfg=JSON.parse(localStorage.getItem('vcn_cfg')||'{}'); }catch(e){ cfg={}; } }

// ── tabs ──
function showTab(name) {
  ['txns','stats','settings'].forEach(function(t) {
    var s=document.getElementById('sec-'+t), b=document.getElementById('tab-'+t), n=document.getElementById('nav-'+t);
    if(s) s.className='sec'+(t===name?' show':'');
    if(b) b.className='tab'+(t===name?' active':'');
    if(n) n.className='nav-item'+(t===name?' active':'');
  });
  if(name==='settings') renderSettings();
}

// ── render ──
function render() {
  var month = document.getElementById('mpicker').value;
  if(!month) return;
  var filtered = txns.filter(function(t){ return t.date && t.date.indexOf(month)===0; });
  var inc=0, exp=0;
  filtered.forEach(function(t){ if(t.type==='income') inc+=t.amount; else exp+=t.amount; });
  var bal = inc-exp;
  document.getElementById('totInc').textContent = fmt(inc);
  document.getElementById('totExp').textContent = fmt(exp);
  var ba = document.getElementById('balAmt');
  ba.textContent = fmt(bal);
  ba.className = 'bal-amt'+(bal>0?' pos':bal<0?' neg':'');
  var parts = month.split('-');
  var names=['','Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
  document.getElementById('balMonth').textContent = names[parseInt(parts[1],10)]+' năm '+parts[0];
  renderTxns(filtered);
  renderStats(filtered, inc, exp);
}

function renderTxns(filtered) {
  var el = document.getElementById('sec-txns');
  var exportBar = '<div class="export-bar">'
    +'<button class="export-btn" onclick="exportCSV()">📊 Xuất CSV</button>'
    +'<button class="export-btn" onclick="exportTXT()">📄 Xuất Báo cáo</button>'
    +'</div>';

  if(!filtered.length) {
    el.innerHTML = exportBar + '<div class="empty">📭 Chưa có giao dịch<br><small>Bấm ➕ Thêm để bắt đầu</small></div>';
    return;
  }
  var groups = {};
  filtered.forEach(function(t){ if(!groups[t.date]) groups[t.date]=[]; groups[t.date].push(t); });
  var dates = Object.keys(groups).sort(function(a,b){ return b>a?1:-1; });

  var rows = '';
  dates.forEach(function(date) {
    var d = new Date(date+'T00:00:00');
    var now = new Date(); now.setHours(0,0,0,0);
    var diff = Math.round((now-d)/86400000);
    var lbl = diff===0?'📅 Hôm nay':diff===1?'📅 Hôm qua':'📅 '+d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();
    rows += '<div class="grp-lbl">'+lbl+'</div>';
    groups[date].forEach(function(t) {
      var wb = t.wallet==='cash'?'<span class="badge badge-cash">💵</span>':'<span class="badge badge-bank">🏦</span>';
      var sb = t.synced?'<span class="badge badge-notion">✓</span>':t.syncing?'<span class="badge badge-sync">⏳</span>':'';
      var person = t.person ? '<span class="badge badge-person">👤 '+t.person+'</span>' : '';
      var note = t.note ? '<span style="color:var(--muted)">'+t.note+'</span>' : '';
      var amtSign = (t.type==='income'?'+':'-');
      rows += '<div class="txn">'
        +'<div class="txn-ico '+(t.type==='income'?'inc':'exp')+'">'+(t.type==='income'?'↑':'↓')+'</div>'
        +'<div class="txn-body">'
          +'<div class="txn-row1">'
            +'<div class="txn-cat">'+(t.category||'—')+'</div>'
            +'<div class="txn-amt '+(t.type==='income'?'inc':'exp')+'">'+amtSign+fmtS(t.amount)+'</div>'
          +'</div>'
          +'<div class="txn-row2">'
            +'<div class="txn-meta">'+wb+person+note+sb+'</div>'
            +'<button class="del-btn" onclick="delTxn(\''+t.id+'\',\''+(t.notionId||'')+'\')">×</button>'
          +'</div>'
        +'</div>'
      +'</div>';
    });
  });

  el.innerHTML = exportBar + '<div class="txn-scroll">' + rows + '</div>';
}

function renderStats(filtered, inc, exp) {
  var el = document.getElementById('sec-stats');
  var catMap = {};
  filtered.forEach(function(t){ catMap[t.category]=(catMap[t.category]||0)+t.amount; });
  var cats = Object.keys(catMap).map(function(c){ return [c,catMap[c]]; }).sort(function(a,b){ return b[1]-a[1]; });
  var expCats = cats.filter(function(c){ return CATS.expense.indexOf(c[0])>=0; });
  var incCats = cats.filter(function(c){ return CATS.income.indexOf(c[0])>=0; });
  var bankExp=0,cashExp=0,bankInc=0,cashInc=0;
  filtered.forEach(function(t){
    if(t.type==='expense'&&t.wallet==='cash') cashExp+=t.amount;
    else if(t.type==='expense') bankExp+=t.amount;
    else if(t.type==='income'&&t.wallet==='cash') cashInc+=t.amount;
    else bankInc+=t.amount;
  });
  function catBlock(title, list, total, color) {
    if(!list.length) return '';
    return '<div class="stat-card"><div class="stat-title">'+title+'</div>'+list.map(function(c){
      var pct=total?Math.round(c[1]/total*100):0;
      return '<div class="srow"><div class="srow-name">'+c[0]+'</div><div class="bar-bg"><div class="bar-fg" style="width:'+pct+'%;background:'+color+'"></div></div><div class="srow-val" style="color:'+color+'">'+fmtS(c[1])+'</div></div>';
    }).join('')+'</div>';
  }
  el.innerHTML = '<div class="stat-card"><div class="stat-title">💳 Theo hình thức thanh toán</div>'
    +'<div class="wrow"><span class="wrow-name" style="color:var(--purple)">🏦 Tài khoản — Chi</span><span class="wrow-val" style="color:var(--red)">'+fmt(bankExp)+'</span></div>'
    +'<div class="wrow"><span class="wrow-name" style="color:var(--gold)">💵 Tiền mặt — Chi</span><span class="wrow-val" style="color:var(--red)">'+fmt(cashExp)+'</span></div>'
    +'<div class="wrow"><span class="wrow-name" style="color:var(--purple)">🏦 Tài khoản — Thu</span><span class="wrow-val" style="color:var(--green)">'+fmt(bankInc)+'</span></div>'
    +'<div class="wrow"><span class="wrow-name" style="color:var(--gold)">💵 Tiền mặt — Thu</span><span class="wrow-val" style="color:var(--green)">'+fmt(cashInc)+'</span></div>'
    +'</div>'
    +catBlock('💸 Chi tiêu theo danh mục',expCats,exp,'var(--red)')
    +catBlock('💚 Thu nhập theo danh mục',incCats,inc,'var(--green)')
    +(!expCats.length&&!incCats.length?'<div class="empty">Chưa có dữ liệu</div>':'');
}

function renderSettings() {
  var el = document.getElementById('sec-settings');
  var ok = cfg.token && cfg.dbId;
  el.innerHTML = '<div class="set-card"><div class="set-title">🔗 Kết nối Notion</div>'
    +'<div class="set-desc">Dữ liệu lưu trên Notion, đồng bộ mọi thiết bị.</div>'
    +'<div class="fld-lbl">Notion Integration Token</div>'
    +'<input class="fld" id="cfgTok" type="password" placeholder="secret_xxx..." value="'+(cfg.token||'')+'"><div class="fld-lbl">Database ID</div>'
    +'<input class="fld" id="cfgDb" placeholder="32 ký tự từ URL Notion" value="'+(cfg.dbId||'')+'"><button class="blue-btn" onclick="saveSettings()">💾 Lưu & kết nối</button>'
    +'<div class="status '+(ok?'ok':'warn')+'">'+(ok?'✅ Đã kết nối Notion':'⚠️ Chưa cài đặt')+'</div></div>'
    +'<div class="set-card"><div class="set-title">📋 Hướng dẫn</div><ul class="steps">'
    +'<li><span class="step-n">1</span><span>Vào <code>notion.so/my-integrations</code> → Tạo integration → Copy token</span></li>'
    +'<li><span class="step-n">2</span><span>Tạo database với cột: <code>Name Loại Số tiền Danh mục Ví Người Ngày Ghi chú</code></span></li>'
    +'<li><span class="step-n">3</span><span>Share database → Kết nối với integration</span></li>'
    +'<li><span class="step-n">4</span><span>Copy Database ID từ URL Notion</span></li>'
    +'</ul></div>'
    +'<div class="set-card"><div class="set-title">🗄️ Dữ liệu</div>'
    +'<div class="set-desc">Đã tải: <b>'+txns.length+'</b> giao dịch</div>'
    +'<button onclick="loadData()" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:13px;font-family:Sora,sans-serif;cursor:pointer;margin-bottom:8px">🔄 Tải lại từ Notion</button>'
    +'<button onclick="exportCSV()" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:13px;font-family:Sora,sans-serif;cursor:pointer">📊 Xuất toàn bộ CSV</button>'
    +'</div>';
}

function saveSettings() {
  cfg = { token: document.getElementById('cfgTok').value.trim(), dbId: document.getElementById('cfgDb').value.trim() };
  saveCfg(); renderSettings();
  toast('✅ Đã lưu! Đang kết nối...');
  loadData();
}

// ── export ──
function getFilteredTxns() {
  var month = document.getElementById('mpicker').value;
  return month ? txns.filter(function(t){ return t.date && t.date.indexOf(month)===0; }) : txns;
}

function exportCSV() {
  var data = getFilteredTxns();
  var rows = [['Ngày','Loại','Danh mục','Số tiền','Ví','Người','Lý do']];
  data.forEach(function(t){
    rows.push([t.date, t.type==='income'?'Thu':'Chi', t.category||'', t.amount, t.wallet==='cash'?'Tiền mặt':'Tài khoản', t.person||'', t.note||'']);
  });
  var csv = rows.map(function(r){ return r.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(','); }).join('\n');
  var bom = '\uFEFF';
  download(bom+csv, 'thu-chi-'+getMonth()+'.csv', 'text/csv;charset=utf-8');
  toast('📊 Đã xuất CSV!');
}

function exportTXT() {
  var data = getFilteredTxns();
  var month = document.getElementById('mpicker').value;
  var parts = month.split('-');
  var names=['','Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
  var title = 'BÁO CÁO THU CHI — '+names[parseInt(parts[1],10)].toUpperCase()+' '+parts[0];
  var sep = '═'.repeat(52);
  var line = '─'.repeat(52);

  var inc=0, exp=0;
  data.forEach(function(t){ if(t.type==='income') inc+=t.amount; else exp+=t.amount; });

  var txt = title+'\n'+sep+'\n\n';

  // Thu
  var incTxns = data.filter(function(t){ return t.type==='income'; });
  if(incTxns.length) {
    txt += '▲ THU NHẬP\n'+line+'\n';
    txt += padR('Ngày',12)+padR('Danh mục',18)+padL('Số tiền',14)+'\n';
    txt += line+'\n';
    incTxns.forEach(function(t){
      txt += padR(t.date.slice(5),12)+padR((t.category||'').slice(0,16),18)+padL(fmtS(t.amount),14)+'\n';
      var detail = [];
      if(t.person) detail.push('Người: '+t.person);
      if(t.note) detail.push('Lý do: '+t.note);
      if(detail.length) txt += '    '+detail.join(' | ')+'\n';
    });
    txt += line+'\n';
    txt += padR('TỔNG THU',30)+padL(fmt(inc),22)+'\n\n';
  }

  // Chi
  var expTxns = data.filter(function(t){ return t.type==='expense'; });
  if(expTxns.length) {
    txt += '▼ CHI TIÊU\n'+line+'\n';
    txt += padR('Ngày',12)+padR('Danh mục',18)+padL('Số tiền',14)+'\n';
    txt += line+'\n';
    expTxns.forEach(function(t){
      txt += padR(t.date.slice(5),12)+padR((t.category||'').slice(0,16),18)+padL(fmtS(t.amount),14)+'\n';
      var detail = [];
      if(t.person) detail.push('Người: '+t.person);
      if(t.note) detail.push('Lý do: '+t.note);
      if(detail.length) txt += '    '+detail.join(' | ')+'\n';
    });
    txt += line+'\n';
    txt += padR('TỔNG CHI',30)+padL(fmt(exp),22)+'\n\n';
  }

  txt += sep+'\n';
  txt += padR('SỐ DƯ',30)+padL(fmt(inc-exp),22)+'\n';
  txt += sep+'\n';
  txt += '\nXuất lúc: '+new Date().toLocaleString('vi-VN');

  download(txt, 'bao-cao-'+getMonth()+'.txt', 'text/plain;charset=utf-8');
  toast('📄 Đã xuất báo cáo!');
}

function padR(str,len){ str=String(str); return str+' '.repeat(Math.max(0,len-str.length)); }
function padL(str,len){ str=String(str); return ' '.repeat(Math.max(0,len-str.length))+str; }

function download(content, filename, type) {
  var blob = new Blob([content],{type:type});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

// ── sheet ──
function openSheet() {
  amtStr=''; updateAmt();
  document.getElementById('personIn').value='';
  document.getElementById('noteIn').value='';
  document.getElementById('overlay').className='overlay on';
  document.getElementById('sheet').className='sheet on';
}
function closeSheet() {
  document.getElementById('overlay').className='overlay';
  document.getElementById('sheet').className='sheet';
  document.getElementById('personList').className='person-list';
}

// ── numpad ──
function pad(v) {
  if(v==='del') amtStr=amtStr.slice(0,-1);
  else if(amtStr.length<12) amtStr+=v;
  updateAmt();
}
function updateAmt() {
  var n=parseInt(amtStr||'0')||0;
  var el=document.getElementById('amtBox');
  el.textContent=fmt(n);
  el.className='amt-box'+(n>0?' has ':' ')+curType;
}

// ── type / wallet / cat ──
function setType(t) {
  curType=t;
  document.getElementById('btnExp').className='type-btn exp'+(t==='expense'?' on':'');
  document.getElementById('btnInc').className='type-btn inc'+(t==='income'?' on':'');
  // update person label
  document.getElementById('personLabel').textContent = t==='income'?'👤 Người đưa':'👤 Người nhận';
  updateAmt();
  curCat=CATS[t][0];
  buildCats();
}
function setWallet(w) {
  curWallet=w;
  document.getElementById('btnBank').className='wallet-btn'+(w==='bank'?' bank-on':'');
  document.getElementById('btnCash').className='wallet-btn'+(w==='cash'?' cash-on':'');
}
function buildCats() {
  var html='';
  CATS[curType].forEach(function(c){ html+='<div class="cat-chip'+(c===curCat?' on':'')+'" onclick="pickCat(\''+c.replace(/'/g,"\\'")+'\')">'+c+'</div>'; });
  document.getElementById('catWrap').innerHTML=html;
}
function pickCat(c){ curCat=c; buildCats(); }

// ── person autocomplete ──
function showPersons() {
  filterPersons();
  document.getElementById('personList').className='person-list show';
}
function hidePersons() {
  setTimeout(function(){ document.getElementById('personList').className='person-list'; }, 200);
}
function filterPersons() {
  var val = document.getElementById('personIn').value.toLowerCase();
  var filtered = PERSONS.filter(function(p){ return !val || p.toLowerCase().indexOf(val)>=0; });
  var html = filtered.map(function(p){
    return '<div class="person-opt" onmousedown="selectPerson(\''+p+'\')">'+p+'</div>';
  }).join('');
  var list = document.getElementById('personList');
  list.innerHTML = html;
  list.className = filtered.length ? 'person-list show' : 'person-list';
}
function selectPerson(p) {
  document.getElementById('personIn').value=p;
  document.getElementById('personList').className='person-list';
}

// ── save ──
async function saveTxn() {
  var amount = parseInt(amtStr||'0');
  if(!amount){ toast('⚠️ Vui lòng nhập số tiền'); return; }
  var btn = document.getElementById('saveBtn');
  btn.disabled=true; btn.textContent='⏳ Đang lưu...';

  var txn = {
    id: String(Date.now()),
    notionId: '',
    type: curType,
    wallet: curWallet,
    amount: amount,
    category: curCat,
    person: document.getElementById('personIn').value.trim(),
    note: document.getElementById('noteIn').value.trim(),
    date: document.getElementById('dateIn').value || getToday(),
    synced: false,
    syncing: true
  };

  txns.unshift(txn);
  render();
  closeSheet();
  btn.disabled=false; btn.textContent='💾 Lưu giao dịch';
  amtStr='';

  if(cfg.token && cfg.dbId) {
    try {
      var nameStr = txn.note || txn.category;
      if(txn.person) nameStr += ' — '+(txn.type==='income'?'Từ: ':'Đến: ')+txn.person;
      var payload = {
        'Name':     {title:[{text:{content:nameStr}}]},
        'Loại':     {select:{name:txn.type==='income'?'Thu':'Chi'}},
        'Số tiền':  {number:txn.amount},
        'Danh mục': {rich_text:[{text:{content:txn.category}}]},
        'Ví':       {select:{name:txn.wallet==='cash'?'Tiền mặt':'Tài khoản'}},
        'Người':    {rich_text:[{text:{content:txn.person||''}}]},
        'Ngày':     {date:{start:txn.date}},
        'Ghi chú':  {rich_text:[{text:{content:txn.note||''}}]}
      };
      var r = await fetch('/api/vi-notion',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:cfg.token,dbId:cfg.dbId,payload:payload})});
      var d = await r.json();
      var i = txns.findIndex(function(t){ return t.id===txn.id; });
      if(i>=0){ txns[i].syncing=false; txns[i].synced=r.ok&&d.success; if(d.id) txns[i].notionId=d.id; }
      render();
      toast(r.ok?'📒 Đã lưu vào Notion!':'⚠️ Lỗi: '+(d.error||'kiểm tra cài đặt'));
    } catch(e) {
      var i=txns.findIndex(function(t){ return t.id===txn.id; });
      if(i>=0){ txns[i].syncing=false; render(); }
      toast('❌ Không kết nối được Notion');
    }
  } else {
    var i=txns.findIndex(function(t){ return t.id===txn.id; });
    if(i>=0){ txns[i].syncing=false; render(); }
    toast('✅ Đã lưu! (Chưa kết nối Notion)');
  }
}

// ── delete ──
async function delTxn(localId, notionId) {
  txns=txns.filter(function(t){ return t.id!==localId; });
  render();
  if(notionId && cfg.token) {
    try { await fetch('/api/vi-notion-delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:cfg.token,pageId:notionId})}); toast('🗑️ Đã xoá'); }
    catch(e){ toast('⚠️ Xoá local nhưng chưa xoá Notion'); }
  }
}

// ── load ──
async function loadData() {
  if(!cfg.token||!cfg.dbId){ setDot('err'); render(); return; }
  setDot('loading');
  document.getElementById('sec-txns').innerHTML='<div class="skel"><div class="skel-line"></div><div class="skel-line s"></div></div><div class="skel"><div class="skel-line"></div><div class="skel-line s"></div></div><div class="skel"><div class="skel-line"></div><div class="skel-line s"></div></div>';
  try {
    var r = await fetch('/api/vi-notion-read',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:cfg.token,dbId:cfg.dbId})});
    var text = await r.text();
    var d;
    try{ d=JSON.parse(text); }catch(e){ throw new Error('Server lỗi: '+text.slice(0,60)); }
    if(!r.ok) throw new Error(d.error||'Lỗi tải dữ liệu');
    txns=d.txns||[];
    setDot('ok');
    render();
    toast('✅ Đã tải '+txns.length+' giao dịch');
  } catch(e) {
    setDot('err'); render(); toast('❌ '+e.message);
  }
}

// ── init ──
window.onload = function() {
  loadCfg();
  document.getElementById('mpicker').value = getMonth();
  document.getElementById('dateIn').value = getToday();
  curCat = CATS.expense[0];
  buildCats();
  setDot(cfg.token&&cfg.dbId?'loading':'err');
  if(cfg.token&&cfg.dbId){ loadData(); } else { render(); }
};
</script>
