<title>Huyên Thọ · Tính Lãi</title>

<style>
:root{
  --green-900:#0c4a21;
  --green-700:#137a33;
  --green-600:#1a8c3d;
  --green-500:#22a34a;
  --green-100:#e3f3e8;
  --green-50:#f1f9f3;
  --ink:#11271a;
  --muted:#5a7a64;
  --line:#d8e8dc;
  --gold:#f5c542;
  --card:#ffffff;
  --bg:#eef6f0;
  --radius:20px;
  --shadow:0 10px 30px rgba(12,74,33,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'Be Vietnam Pro',sans-serif;
  background:
    radial-gradient(120% 60% at 50% -10%, rgba(34,163,74,.18), transparent 60%),
    var(--bg);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:460px;margin:0 auto;padding:0 16px 40px;}

/* Header */
.header{
  background:linear-gradient(160deg,var(--green-600),var(--green-900));
  border-radius:0 0 28px 28px;
  padding:14px 18px 26px;
  margin:0 -16px 18px;
  box-shadow:0 12px 28px rgba(12,74,33,.28);
  position:relative;
  overflow:hidden;
}
.header::after{
  content:"";position:absolute;right:-40px;top:-40px;
  width:170px;height:170px;border-radius:50%;
  background:rgba(255,255,255,.06);
}
.logo-box{display:flex;justify-content:center;}
.logo-box img{
  width:100%;max-width:300px;height:auto;display:block;
  border-radius:16px;
}
.tagline{
  text-align:center;color:rgba(255,255,255,.92);
  font-size:13px;font-weight:500;letter-spacing:.3px;margin-top:10px;
}

/* Card */
.card{
  background:var(--card);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:18px 16px;margin-bottom:16px;
  border:1px solid var(--line);
}
.field{margin-bottom:16px;}
.field:last-child{margin-bottom:0;}
.label{
  display:flex;align-items:center;gap:7px;
  font-size:13.5px;font-weight:600;color:var(--green-700);
  margin-bottom:7px;letter-spacing:.2px;
}
.label .dot{width:7px;height:7px;border-radius:50%;background:var(--green-500);}

input[type="date"],input[type="text"],input[type="tel"]{
  width:100%;border:1.5px solid var(--line);border-radius:14px;
  padding:13px 14px;font-size:17px;font-family:inherit;font-weight:600;
  color:var(--ink);background:var(--green-50);outline:none;
  transition:border-color .15s, background .15s;
}
input:focus{border-color:var(--green-500);background:#fff;}
input[type="date"]{font-weight:600;}

/* Days display */
.days-row{
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,var(--green-100),var(--green-50));
  border:1.5px dashed var(--green-500);border-radius:14px;
  padding:13px 16px;
}
.days-row .dlabel{font-size:14px;font-weight:600;color:var(--green-700);}
.days-row .dval{font-size:22px;font-weight:800;color:var(--green-900);}
.days-row .dval small{font-size:13px;font-weight:600;color:var(--muted);}

/* Money input */
.money-wrap{position:relative;}
.money-wrap .cur{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  font-size:16px;font-weight:700;color:var(--muted);pointer-events:none;
}
.money-wrap input{padding-right:34px;font-size:20px;font-weight:800;color:var(--green-900);}

/* Rate selector */
.rate-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.rate-btn{
  border:1.5px solid var(--line);background:#fff;border-radius:13px;
  padding:13px 4px;font-size:16px;font-weight:700;font-family:inherit;
  color:var(--ink);cursor:pointer;transition:all .15s;
}
.rate-btn.active{
  background:var(--green-600);border-color:var(--green-600);color:#fff;
  box-shadow:0 6px 14px rgba(26,140,61,.35);transform:translateY(-1px);
}
.custom-toggle{
  margin-top:9px;width:100%;border:1.5px solid var(--line);background:#fff;
  border-radius:13px;padding:11px;font-size:14.5px;font-weight:600;
  font-family:inherit;color:var(--green-700);cursor:pointer;transition:all .15s;
}
.custom-toggle.active{background:var(--gold);border-color:var(--gold);color:var(--green-900);}
.custom-input{margin-top:9px;display:none;}
.custom-input.show{display:block;}

/* Result */
.result-card{
  background:linear-gradient(160deg,var(--green-700),var(--green-900));
  color:#fff;border:none;position:relative;overflow:hidden;
}
.result-card::before{
  content:"";position:absolute;left:-30px;bottom:-50px;
  width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.05);
}
.res-title{font-size:13px;font-weight:600;color:rgba(255,255,255,.8);letter-spacing:.4px;text-transform:uppercase;}
.res-amount{font-size:38px;font-weight:800;letter-spacing:-.5px;margin:4px 0 2px;line-height:1.1;}
.res-amount .vnd{font-size:20px;font-weight:700;opacity:.85;}
.res-formula{
  font-size:12.5px;color:rgba(255,255,255,.78);
  background:rgba(0,0,0,.16);border-radius:11px;padding:9px 12px;margin-top:12px;
  line-height:1.55;
}
.res-total{
  display:flex;justify-content:space-between;align-items:baseline;
  border-top:1px solid rgba(255,255,255,.18);margin-top:13px;padding-top:12px;
}
.res-total .lbl{font-size:13.5px;font-weight:600;color:rgba(255,255,255,.85);}
.res-total .val{font-size:21px;font-weight:800;}

.reset{
  width:100%;background:transparent;border:1.5px solid var(--line);
  color:var(--muted);border-radius:14px;padding:13px;font-size:14.5px;
  font-weight:600;font-family:inherit;cursor:pointer;margin-top:2px;
}
.reset:active{background:#fff;}
.foot{text-align:center;font-size:11.5px;color:var(--muted);margin-top:18px;}
</style>
</head>

<style>
.qotd{background:#14241B;color:#DCE7DE;font-family:'Be Vietnam Pro',system-ui,sans-serif;padding:calc(10px + env(safe-area-inset-top)) 16px 10px;font-size:13px;line-height:1.5;text-align:center;}
.qotd em{font-style:italic;}
.qotd .qotd-ai{color:#E8913A;font-style:normal;font-weight:600;white-space:nowrap;}
.app-tabs{position:fixed;left:0;right:0;bottom:0;z-index:22;display:flex;background:#14241B;padding-bottom:env(safe-area-inset-bottom);font-family:'Be Vietnam Pro',system-ui,sans-serif;box-shadow:0 -4px 16px rgba(0,0,0,.22);}
.app-tabs .thome{flex:0 0 56px;display:flex;align-items:center;justify-content:center;color:#E8913A;padding:8px 0 7px;border-top:2.5px solid transparent;}
.app-tabs .thome:active{color:#FFFFFF;}
.app-tabs a{flex:1;text-align:center;padding:10px 4px 9px;font-size:12.5px;font-weight:600;color:#9DB5A6;text-decoration:none;border-top:2.5px solid transparent;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.app-tabs a.on{color:#FFFFFF;border-top-color:#E8913A;}
body{padding-bottom:64px;}

}).catch(function(){});

<script>
const $ = id => document.getElementById(id);
const startDate=$('startDate'), endDate=$('endDate'), daysEl=$('days'),
      amountEl=$('amount'), interestEl=$('interest'), totalEl=$('total'),
      formulaEl=$('formula'), customToggle=$('customToggle'),
      customWrap=$('customWrap'), customRate=$('customRate');

let selectedRate = null;   // số %/tháng đang dùng
let usingCustom = false;

// ---- Ngày hôm nay (local) cho ngày tính lãi ----
function todayStr(){
  const d=new Date();
  const off=d.getTimezoneOffset();
  const local=new Date(d.getTime()-off*60000);
  return local.toISOString().slice(0,10);
}
endDate.value = todayStr();

// ---- Định dạng số tiền 1.000.000 ----
function fmt(n){
  if(n===null||isNaN(n)) return '0';
  return Math.round(n).toLocaleString('vi-VN');
}
function parseMoney(str){
  const digits=(str||'').replace(/[^\d]/g,'');
  return digits? parseInt(digits,10):0;
}

// ---- Số ngày ----
function calcDays(){
  if(!startDate.value || !endDate.value) return 0;
  const s=new Date(startDate.value), e=new Date(endDate.value);
  const diff=Math.round((e-s)/86400000);
  return diff>0? diff : 0;
}

// ---- Lãi suất hiện tại ----
function currentRate(){
  if(usingCustom){
    const r=parseFloat((customRate.value||'').replace(',','.'));
    return isNaN(r)? null : r;
  }
  return selectedRate;
}

// ---- Tính toán & cập nhật ----
function update(){
  const days=calcDays();
  daysEl.textContent=days;

  const amount=parseMoney(amountEl.value);
  const rate=currentRate();

  if(amount>0 && rate!==null && days>0){
    const interest = amount * (rate/100) / 30 * days;
    interestEl.textContent=fmt(interest);
    totalEl.textContent=fmt(amount+interest);
    formulaEl.innerHTML =
      fmt(amount)+' ₫ × '+rate+'% ÷ 30 × '+days+' ngày'+
      '<br>= <b style="color:#fff">'+fmt(interest)+' ₫</b>';
  } else {
    interestEl.textContent='0';
    totalEl.textContent=fmt(amount);
    formulaEl.textContent='Nhập số tiền và chọn lãi suất để tính.';
  }
}

// ---- Sự kiện ngày & tiền ----
[startDate,endDate].forEach(el=>el.addEventListener('change',update));

amountEl.addEventListener('input',()=>{
  const raw=parseMoney(amountEl.value);
  amountEl.value = raw? raw.toLocaleString('vi-VN') : '';
  update();
});

// ---- Nút chọn lãi suất ----
document.querySelectorAll('.rate-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.rate-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    selectedRate=parseFloat(btn.dataset.rate);
    usingCustom=false;
    customToggle.classList.remove('active');
    customWrap.classList.remove('show');
    customRate.value='';
    update();
  });
});

// ---- Tự nhập ----
customToggle.addEventListener('click',()=>{
  usingCustom=!usingCustom;
  customToggle.classList.toggle('active',usingCustom);
  customWrap.classList.toggle('show',usingCustom);
  if(usingCustom){
    document.querySelectorAll('.rate-btn').forEach(b=>b.classList.remove('active'));
    selectedRate=null;
    setTimeout(()=>customRate.focus(),50);
  }
  update();
});
customRate.addEventListener('input',update);

// ---- Làm mới ----
$('resetBtn').addEventListener('click',()=>{
  startDate.value='';
  endDate.value=todayStr();
  amountEl.value='';
  customRate.value='';
  usingCustom=false;
  selectedRate=null;
  customToggle.classList.remove('active');
  customWrap.classList.remove('show');
  document.querySelectorAll('.rate-btn').forEach(b=>b.classList.remove('active'));
  update();
});

update();
</script>
</body>
</html>
