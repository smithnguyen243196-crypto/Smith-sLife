<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1B5235" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <title>Nông Lịch Số — Smith Nguyễn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,500&family=Lora:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap" rel="stylesheet" />
    <style>
      *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
      html,body{height:100%;margin:0;width:100%;overflow-x:hidden}
      body{background:#ECF1E6}
      #root{height:100%}
      button{font-family:inherit}
      input,textarea,select{font-family:inherit}
      ::placeholder{color:#9AA79C;opacity:1}
      ::-webkit-scrollbar{width:10px;height:10px}
      ::-webkit-scrollbar-thumb{background:#CBD6C0;border-radius:999px;border:3px solid transparent;background-clip:content-box}
      ::-webkit-scrollbar-thumb:hover{background:#B4C2A6;background-clip:content-box}
      :focus-visible{outline:2.5px solid #C79A2C;outline-offset:2px;border-radius:6px}
      .lift{transition:transform .18s ease, box-shadow .18s ease}
      @media (hover:hover){.lift:hover{transform:translateY(-2px)}}
      .press{transition:transform .08s ease}
      .press:active{transform:scale(.97)}
      @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
      .rise{animation:rise .26s cubic-bezier(.2,.7,.3,1) both}
      @keyframes draw{from{stroke-dashoffset:var(--len)}to{stroke-dashoffset:var(--off)}}
      @media (prefers-reduced-motion:reduce){
        *{animation-duration:.001ms !important;transition-duration:.001ms !important}
        .rise{animation:none}
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
