<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1B5235" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <title>Nông Lịch Số — Smith Nguyễn</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,500&family=Lora:ital,wght@0,500;0,600;0,700;1,500;1,600&display=swap" rel="stylesheet" />
    <style>
      :root{
        --canvas:#ECF1E6; --canvasDeep:#E2E9D9;
        --surface:#FFFFFF; --surfaceAlt:#F3F6EE; --surfaceSink:#EAEFE2;
        --ink:#1B5235; --inkDeep:#0F3A24; --inkSoft:#DBE8DF;
        --leaf:#3E8E5A; --leafSoft:#E3F1E6;
        --grain:#C79A2C; --grainDeep:#A87E1C; --grainSoft:#F4E9CA;
        --soil:#6A523E; --soilSoft:#EFE7DD;
        --text:#1C271F; --muted:#69776C; --faint:#9AA79C;
        --line:#E1E6D7; --lineSoft:#ECEFE3;
        --danger:#B5432B; --dangerSoft:#F4DED7; --success:#2E8B57;
        --onInk:#FFFFFF; --accentOnInk:#F4E9CA; --barBg:rgba(255,255,255,.92);
        --shadowSm:0 1px 2px rgba(16,58,36,.05), 0 3px 10px rgba(16,58,36,.05);
        --shadow:0 10px 30px rgba(16,58,36,.12);
        --shadowLg:0 18px 48px rgba(16,58,36,.16);
        --scrollthumb:#CBD6C0; --scrollthumbh:#B4C2A6; --ph:#9AA79C; --focus:#C79A2C;
        color-scheme:light;
      }
      html[data-theme="dark"]{
        --canvas:#0F1713; --canvasDeep:#0A110D;
        --surface:#17211B; --surfaceAlt:#1E2922; --surfaceSink:#121A14;
        --ink:#5FC487; --inkDeep:#46A86C; --inkSoft:#1C3326;
        --leaf:#4FB477; --leafSoft:#18301F;
        --grain:#D9B45A; --grainDeep:#E6C677; --grainSoft:#2C2613;
        --soil:#C2A88E; --soilSoft:#2A2218;
        --text:#E8EFE9; --muted:#9DB0A2; --faint:#6E8175;
        --line:#2A352D; --lineSoft:#222D26;
        --danger:#E27A61; --dangerSoft:#3A211B; --success:#5BC489;
        --onInk:#0C130F; --accentOnInk:#EAD7A4; --barBg:rgba(20,29,24,.92);
        --shadowSm:0 1px 2px rgba(0,0,0,.30), 0 3px 10px rgba(0,0,0,.30);
        --shadow:0 12px 32px rgba(0,0,0,.45);
        --shadowLg:0 18px 48px rgba(0,0,0,.55);
        --scrollthumb:#2E3B31; --scrollthumbh:#3C4D40; --ph:#6E8175; --focus:#D9B45A;
        color-scheme:dark;
      }
      *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
      html,body{height:100%;margin:0;width:100%;overflow-x:hidden}
      body{background:var(--canvas);transition:background .25s ease}
      #root{height:100%}
      button{font-family:inherit}
      input,textarea,select{font-family:inherit}
      ::placeholder{color:var(--ph);opacity:1}
      ::-webkit-scrollbar{width:10px;height:10px}
      ::-webkit-scrollbar-thumb{background:var(--scrollthumb);border-radius:999px;border:3px solid transparent;background-clip:content-box}
      ::-webkit-scrollbar-thumb:hover{background:var(--scrollthumbh);background-clip:content-box}
      :focus-visible{outline:2.5px solid var(--focus);outline-offset:2px;border-radius:6px}
      .lift{transition:transform .18s ease, box-shadow .18s ease}
      @media (hover:hover){.lift:hover{transform:translateY(-2px)}}
      .press{transition:transform .08s ease}
      .press:active{transform:scale(.97)}
      @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
      .rise{animation:rise .26s cubic-bezier(.2,.7,.3,1) both}
      @keyframes draw{from{stroke-dashoffset:var(--len)}to{stroke-dashoffset:var(--off)}}
      @media (prefers-reduced-motion:reduce){
        *{animation-duration:.001ms !important;transition-duration:.001ms !important}
        .rise{animation:none}
      }
    </style>
    <script>
      (function(){
        try{
          var t = localStorage.getItem('nls-theme');
          if(!t) t = (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
          document.documentElement.dataset.theme = t;
          var m = document.querySelector('meta[name="theme-color"]');
          if(m) m.setAttribute('content', t === 'dark' ? '#0F1713' : '#1B5235');
        }catch(e){}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
