<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#14241B" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Công cụ của Smith</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&family=Be+Vietnam+Pro:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #14241B;          /* xanh đêm đồng ruộng */
      --bg-soft: #1B2F24;
      --mist: #9DB5A6;        /* chữ phụ */
      --paper-ink: #1E2A24;
      --sun: #E8913A;         /* cam nắng — từ app Ngày */
      --display: 'Bricolage Grotesque', system-ui, sans-serif;
      --body: 'Be Vietnam Pro', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { min-height: 100%; }
    body {
      background:
        radial-gradient(110% 50% at 50% -8%, rgba(232,145,58,.10), transparent 55%),
        var(--bg);
      color: #F0F4F0;
      font-family: var(--body);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }
    .wrap { max-width: 480px; margin: 0 auto; padding: 40px 18px calc(40px + env(safe-area-inset-bottom)); }

    /* Lời chào */
    .eyebrow { font-size: 12.5px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--mist); }
    h1 {
      font-family: var(--display); font-weight: 700;
      font-size: clamp(30px, 8vw, 38px); line-height: 1.12;
      margin: 6px 0 4px; color: #FBF6EC;
    }
    .today { font-size: 14.5px; color: var(--mist); }
    .today strong { color: var(--sun); font-weight: 600; }

    /* Kệ công cụ */
    .shelf { display: flex; flex-direction: column; gap: 14px; margin-top: 30px; }
    .tile {
      display: flex; align-items: center; gap: 16px;
      border-radius: 18px; padding: 18px;
      text-decoration: none;
      border: 1px solid transparent;
      transition: transform .15s ease, box-shadow .15s ease;
      min-height: 92px;
    }
    .tile:active { transform: scale(.985); }
    @media (hover: hover) {
      .tile:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,0,0,.30); }
    }
    .mono {
      font-family: var(--display); font-weight: 700; font-size: 30px;
      width: 54px; height: 54px; flex: none;
      display: flex; align-items: center; justify-content: center;
      border-radius: 14px;
    }
    .tile-name { font-family: var(--display); font-weight: 700; font-size: 19px; line-height: 1.2; }
    .tile-desc { font-size: 13.5px; margin-top: 3px; opacity: .82; }
    .chev { margin-left: auto; flex: none; font-size: 18px; opacity: .55; }

    /* 1. Kiểm Két — giấy & ngọc lục bảo */
    .t-ket { background: #F4F1EA; color: var(--paper-ink); border-color: #E1DCD0; }
    .t-ket .mono { background: #E5F0EB; color: #0F6E54; }

    /* 2. Ví Cá Nhân — đêm & xanh neon */
    .t-vi { background: #0F1520; color: #E8F0FE; border-color: #1E2D45; }
    .t-vi .mono { background: rgba(0,229,160,.12); color: #00E5A0; }

    /* 3. Ngày — giấy ấm & nắng */
    .t-ngay { background: #FCF8F1; color: #241E17; border-color: #ECE1D1; }
    .t-ngay .mono { background: #FAEBDA; color: #C9742A; }

    /* 4. Tính Lãi Huyên Thọ — xanh đồng lúa */
    .t-lai { background: linear-gradient(150deg, #1A8C3D, #0C4A21); color: #F1F9F3; border-color: rgba(255,255,255,.14); }
    .t-lai .mono { background: rgba(255,255,255,.14); color: #F5C542; }

    footer { margin-top: 36px; text-align: center; font-size: 12.5px; color: var(--mist); letter-spacing: .4px; }

    /* Câu nói của ngày */
    .qotd {
      margin-top: 22px; padding: 14px 16px;
      background: var(--bg-soft); border: 1px solid rgba(255,255,255,.07);
      border-left: 3px solid var(--sun); border-radius: 12px;
      font-size: 14px; line-height: 1.55; color: #DCE7DE;
    }
    .qotd em { font-style: italic; }
    .qotd .qotd-ai { color: var(--sun); font-style: normal; font-weight: 600; white-space: nowrap; }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <div class="eyebrow">Bộ công cụ hằng ngày</div>
      <h1 id="greeting">Chào Smith</h1>
      <p class="today" id="today"></p>
    </header>

    <blockquote class="qotd" id="qotd" hidden></blockquote>

    <nav class="shelf">
      <a class="tile t-ket" href="/kiem-ket.html">
        <span class="mono">₫</span>
        <span>
          <span class="tile-name">Kiểm Két</span>
          <span class="tile-desc" style="display:block">Đếm tiền, đối chiếu két cuối ngày</span>
        </span>
        <span class="chev">›</span>
      </a>

      <a class="tile t-vi" href="/vi-ca-nhan.html">
        <span class="mono">V</span>
        <span>
          <span class="tile-name">Ví Cá Nhân</span>
          <span class="tile-desc" style="display:block">Theo dõi thu chi cá nhân</span>
        </span>
        <span class="chev">›</span>
      </a>

      <a class="tile t-ngay" href="/ngay.html">
        <span class="mono">N</span>
        <span>
          <span class="tile-name">Ngày</span>
          <span class="tile-desc" style="display:block">Nhật ký, thói quen, nhiệm vụ hôm nay</span>
        </span>
        <span class="chev">›</span>
      </a>

      <a class="tile t-lai" href="/tinh-lai.html">
        <span class="mono">%</span>
        <span>
          <span class="tile-name">Tính Lãi · Huyên Thọ</span>
          <span class="tile-desc" style="display:block">Tính lãi theo ngày cho khách hàng</span>
        </span>
        <span class="chev">›</span>
      </a>
    </nav>

    <footer>Vật tư nông nghiệp Huyên Thọ</footer>
  </main>

  <script>
    (function () {
      var now = new Date();
      var h = now.getHours();
      var greet = h < 11 ? 'Chào buổi sáng, Smith' : h < 14 ? 'Chào buổi trưa, Smith' : h < 18 ? 'Chào buổi chiều, Smith' : 'Chào buổi tối, Smith';
      document.getElementById('greeting').textContent = greet;
      var thu = ['Chủ nhật', 'Thứ hai', 'Thứ ba', 'Thứ tư', 'Thứ năm', 'Thứ sáu', 'Thứ bảy'][now.getDay()];
      document.getElementById('today').innerHTML =
        '<strong>' + thu + '</strong>, ngày ' + now.getDate() + ' tháng ' + (now.getMonth() + 1) + ' năm ' + now.getFullYear();

      fetch('/api/quote').then(function (r) { return r.json(); }).then(function (d) {
        if (!d || !d.text) return;
        var el = document.getElementById('qotd');
        var em = document.createElement('em');
        em.textContent = '\u201c' + d.text + '\u201d';
        el.appendChild(em);
        if (d.author) {
          var sp = document.createElement('span');
          sp.className = 'qotd-ai';
          sp.textContent = ' \u2014 ' + d.author;
          el.appendChild(sp);
        }
        el.hidden = false;
      }).catch(function () {});
    })();
  </script>
</body>
</html>
